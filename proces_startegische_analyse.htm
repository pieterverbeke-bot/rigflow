<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI&G Flow - Podcast Case</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS voor de styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // Tailwind configuratie uitbreiden met de nieuwe basiskleuren
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#8a45ac', /* Base: #783c96 */
                            pink: '#df3580',   /* Base: #d23278 */
                            red: '#f05046',    /* Base: #e6463c */
                            yellow: '#fbc531', /* Base: #fabb22 */
                            
                            navy: '#0B0F19',   /* Donkere achtergrond */
                            card: '#111827',   /* Kaart achtergrond */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Verberg de standaard scrollbar voor een schoner design */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animaties */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes drawPath {
            from { width: 0%; }
            to { width: 100%; }
        }
        @keyframes shimmerLine {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        @keyframes particleFlow {
            0% { left: -5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 105%; opacity: 0; }
        }

        /* Classes die via JavaScript worden toegevoegd voor het inlaad-effect */
        .step-container .step-card-top {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
        }
        .step-container .step-card-bottom {
            opacity: 0;
            transform: translateY(-40px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
        }
        .step-container .step-node {
            transform: scale(0);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-container .step-line {
            transform: scaleY(0);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
        }

        /* Zichtbare status */
        .step-container.is-visible .step-card-top {
            opacity: 1;
            transform: translateY(0);
        }
        .step-container.is-visible .step-card-bottom {
            opacity: 1;
            transform: translateY(0);
        }
        .step-container.is-visible .step-node {
            transform: scale(1);
            opacity: 1;
        }
        .step-container.is-visible .step-line {
            transform: scaleY(1);
        }

        /* Progress bar transitie */
        #progress-bar {
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-brand-navy text-slate-200 font-sans selection:bg-brand-pink selection:text-white overflow-x-hidden overflow-y-auto flex flex-col relative min-h-screen">

    <!-- Instructie & Opslaan Banner -->
    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-brand-card/90 backdrop-blur-md border border-brand-pink/40 text-white pl-5 pr-2 py-1.5 rounded-full shadow-[0_0_20px_rgba(223,53,128,0.2)] text-sm font-medium flex items-center gap-4 animate-[fadeInDown_1s_ease-out_forwards]">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="edit-3" aria-hidden="true" class="w-4 h-4 text-brand-pink"></svg>
            <span class="hidden sm:inline">Klik op teksten om ze aan te passen!</span>
            <span class="sm:hidden">Klik om te typen</span>
        </div>
        <button id="save-btn" onclick="saveData()" class="bg-gradient-to-r from-brand-pink to-brand-red hover:opacity-90 text-white px-4 py-1.5 rounded-full transition-all flex items-center gap-2 font-bold shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="save" aria-hidden="true" class="w-4 h-4"></svg> <span class="hidden sm:inline">Opslaan als HTML</span><span class="sm:hidden">Opslaan</span>
        </button>
    </div>

    <!-- Achtergrond Glow Effecten -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-brand-purple/10 blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-brand-yellow/10 blur-[120px]"></div>
        <div class="absolute top-[40%] left-[40%] w-[30%] h-[30%] rounded-full bg-brand-pink/5 blur-[100px] animate-pulse"></div>
    </div>

    <!-- Header -->
    <div class="relative z-20 pt-24 px-8 md:px-16 flex justify-between items-end opacity-0" style="animation: fadeInDown 1s ease-out forwards 0.2s;">
        <div>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight text-white mb-3 drop-shadow-lg">
                RI&G <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-pink to-brand-yellow">Flow</span>
            </h1>
            <p id="main-subtitle" class="text-lg text-slate-400 max-w-xl font-medium cursor-text outline-none focus:text-white focus:bg-white/10 rounded px-1 -mx-1 transition-colors whitespace-pre-wrap" contenteditable="true" spellcheck="false">De Podcast Analyse: Van strategische vraag naar implementatie</p>
        </div>
        <button onclick="scrollRight()" class="hidden lg:flex items-center gap-3 text-brand-pink animate-bounce bg-brand-pink/10 px-4 py-2 rounded-full border border-brand-pink/20 hover:bg-brand-pink/20 transition-colors cursor-pointer outline-none focus:ring-2 focus:ring-brand-pink/50">
            <span class="text-xs font-bold tracking-wider uppercase">Klik of scroll om te ontdekken</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="arrow-right" aria-hidden="true" class="w-4 h-4"></svg>
        </button>
    </div>

    <!-- Horizontale Scroll Container -->
    <div id="scroll-container" class="flex-1 relative w-full overflow-x-auto overflow-y-auto hide-scrollbar flex items-center z-10" style="scroll-snap-type: x mandatory;">
        <div class="flex items-center relative min-w-max px-8 md:px-32 h-full py-20 md:py-48">
            
            <!-- De centrale geanimeerde hoofdlijn -->
            <div class="absolute top-1/2 left-0 right-16 h-1 -translate-y-1/2 bg-slate-800 rounded-full overflow-hidden">
                <div class="absolute top-0 left-0 h-full w-full bg-gradient-to-r from-brand-purple via-brand-pink to-brand-yellow opacity-90" style="animation: drawPath 3s ease-out forwards, shimmerLine 3s linear infinite; background-size: 200% 100%;">
                </div>
                <!-- Bewegende deeltjes door de lijn -->
                <div class="absolute top-0 left-0 h-full w-20 bg-white blur-[3px]" style="animation: particleFlow 2s linear infinite;"></div>
            </div>

            <!-- Hier worden de stappen dynamisch via JavaScript ingeladen -->
            <div id="steps-container" class="flex"></div>
            
            <!-- Einde spacer -->
            <div class="w-24 md:w-32 shrink-0"></div>
        </div>
    </div>

    <!-- Progress Bar (Onderaan vast) -->
    <div class="fixed bottom-0 left-0 h-1 bg-slate-800 w-full z-20">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-brand-purple to-brand-yellow w-0 shadow-[0_0_15px_rgba(223,53,128,0.5)]" style="width: 0px;"></div>
    </div>

    <script>
        // ============================================================================
        // BASIS TEKSTEN: AANGEPAST NAAR DE 8 STAPPEN VAN DE PODCAST ANALYSE
        // ============================================================================

        const PROCESS_STEPS = [
            {
                "id": 1,
                "type": "step",
                "title": "Intake & High-level Briefing",
                "description": "Roxanne capteert de strategische directievraag (conversie Spotify-luisteraars) en formuleert de briefing: WAAROM doen we dit en WAT wordt er verwacht?",
                "icon": "message-square",
                "color": "from-brand-purple to-brand-pink",
                "shadow": "shadow-brand-purple/40"
            },
            {
                "id": 2,
                "type": "step",
                "title": "Analyseplan & Scope",
                "description": "Céline werkt de briefing uit in een plan (HOE): dataset bouwen, scope afbakenen (geen TTS) en fasering bepalen (Fase 1: directie, Fase 2: redactie).",
                "icon": "compass",
                "color": "from-brand-pink to-brand-red",
                "shadow": "shadow-brand-pink/40"
            },
            {
                "id": 3,
                "type": "decision",
                "title": "Stakeholder Input & Approval",
                "description": "Aftoetsen van het plan bij audio-stakeholders (w.1). Na de verwerking van feedback geeft Roxanne / opdrachtgever een formele 'GO' voor uitvoering.",
                "icon": "users",
                "color": "from-brand-red to-brand-yellow",
                "shadow": "shadow-brand-red/40"
            },
            {
                "id": 4,
                "type": "step",
                "title": "Uitvoering & Dataverzameling",
                "description": "Dataset bouwen (w.1-3) en patronen analyseren (w.4) o.b.v. metrics zoals kwalitatieve starts (>10s). Een interne demo wordt direct ingepland.",
                "icon": "database",
                "color": "from-brand-yellow to-brand-red",
                "shadow": "shadow-brand-yellow/40"
            },
            {
                "id": 5,
                "type": "step",
                "title": "Demo & Interne Afstemming",
                "description": "Eerste versie van de 'podcast-matrix' wordt intern gedemonstreerd. Feedback wordt verwerkt om de verhaallijn voor directie scherp te stellen.",
                "icon": "presentation",
                "color": "from-brand-red to-brand-pink",
                "shadow": "shadow-brand-pink/40"
            },
            {
                "id": 6,
                "type": "step",
                "title": "Eindpresentatie Directie",
                "description": "De meeting draait om keuzes. Directie gebruikt de podcast-matrix om het DPG-kader (gratis vs premium) definitief vast te stellen. Start fase 2.",
                "icon": "briefcase",
                "color": "from-brand-pink to-brand-purple",
                "shadow": "shadow-brand-purple/40"
            },
            {
                "id": 7,
                "type": "step",
                "title": "Roll-out & Implementatie",
                "description": "De inzichten worden doorvertaald. Redacties en makers krijgen concrete handvatten over content en distributie (frequentie, ideale lengte).",
                "icon": "rocket",
                "color": "from-brand-purple to-brand-pink",
                "shadow": "shadow-brand-purple/40"
            },
            {
                "id": 8,
                "type": "step",
                "title": "Follow-up & Evaluatie",
                "description": "Na 3 maanden meten we de impact: Wat is er veranderd door de analyse? Is er nood aan extra RI&G ondersteuning of sturing bij bepaalde titels?",
                "icon": "line-chart",
                "color": "from-brand-pink to-brand-yellow",
                "shadow": "shadow-brand-yellow/50"
            }
        ];

        // ============================================================================
        // LOGICA VOOR HET DOWNLOADEN VAN HET AANGEPASTE HTML BESTAND
        // ============================================================================
        
        window.scrollRight = function() {
            const container = document.getElementById('scroll-container');
            if (container) {
                container.scrollBy({
                    left: 400, // Aantal pixels om op te schuiven per klik
                    behavior: 'smooth'
                });
            }
        }

        function saveData() {
            PROCESS_STEPS.forEach(step => {
                const titleEl = document.querySelector(`h3[data-step-id="${step.id}"]`);
                const descEl = document.querySelector(`p[data-step-id="${step.id}"]`);
                
                if (titleEl) step.title = titleEl.innerText;
                if (descEl) step.description = descEl.innerText;
            });

            const clone = document.documentElement.cloneNode(true);
            
            const stepsContainer = clone.querySelector('#steps-container');
            if (stepsContainer) stepsContainer.innerHTML = '';
            
            const progressBar = clone.querySelector('#progress-bar');
            if (progressBar) progressBar.style.width = '0';
            
            const liveSubtitle = document.getElementById('main-subtitle');
            const clonedSubtitle = clone.querySelector('#main-subtitle');
            if (liveSubtitle && clonedSubtitle) {
                clonedSubtitle.innerText = liveSubtitle.innerText;
            }

            const scripts = clone.querySelectorAll('script');
            scripts.forEach(script => {
                if (script.innerHTML.includes('const PROCESS_STEPS =')) {
                    const regex = /const PROCESS_STEPS = \[[\s\S]*?\];/;
                    const safeJson = JSON.stringify(PROCESS_STEPS, null, 4).replace(/</g, '\\u003c');
                    const newArrayString = "const PROCESS_STEPS = " + safeJson + ";";
                    script.innerHTML = script.innerHTML.replace(regex, newArrayString);
                }
            });

            const tailwindStyle = clone.querySelector('style[data-tailwindcss]');
            if (tailwindStyle) tailwindStyle.remove();

            const htmlContent = `<!DOCTYPE html>\n<html lang="nl">\n${clone.innerHTML}\n</html>`;
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'rig-flow-podcast-analyse.html';
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            const saveBtn = document.getElementById('save-btn');
            const originalHTML = saveBtn.innerHTML;
            
            saveBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> <span class="hidden sm:inline">Gedownload!</span><span class="sm:hidden">Gelukt!</span>';
            saveBtn.classList.add('from-emerald-500', 'to-emerald-600');
            saveBtn.classList.remove('from-brand-pink', 'to-brand-red');
            lucide.createIcons();
            
            setTimeout(() => {
                saveBtn.innerHTML = originalHTML;
                saveBtn.classList.remove('from-emerald-500', 'to-emerald-600');
                saveBtn.classList.add('from-brand-pink', 'to-brand-red');
                lucide.createIcons();
            }, 3000);
        }

        // ============================================================================
        // LOGICA VOOR HET OPBOUWEN VAN DE PAGINA
        // ============================================================================

        const stepsContainer = document.getElementById('steps-container');
        const progressBar = document.getElementById('progress-bar');
        const scrollContainer = document.getElementById('scroll-container');
        
        function generateCardHTML(step, isDecision) {
            const isLastStep = step.id === PROCESS_STEPS.length;
            
            return `
                <div class="relative bg-brand-card/95 backdrop-blur-xl p-6 md:p-8 rounded-xl border border-slate-700/50 hover:bg-[#1f2937]/80 hover:border-brand-pink/50 transition-all duration-300 group-hover:shadow-[0_8px_30px_rgba(223,53,128,0.15)] group-hover:-translate-y-2 ${isDecision ? 'border-brand-red/30 bg-[#2A1515]/80' : ''}">
                    
                    <div class="absolute top-0 left-0 w-full h-1 rounded-t-xl bg-gradient-to-r ${step.color} ${isLastStep ? 'opacity-100' : 'opacity-80'}"></div>

                    ${isDecision ? `
                    <div class="text-xs font-bold tracking-widest uppercase mb-3 text-brand-red flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-brand-red animate-pulse"></div>
                        Beslismoment
                    </div>` : ''}
                    
                    <div class="flex items-center gap-3 mb-3 relative">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br ${step.color} opacity-20 absolute -top-4 -left-4 blur-xl pointer-events-none"></div>
                        <h3 data-step-id="${step.id}" class="text-xl md:text-2xl font-bold text-white relative z-10 tracking-tight outline-none focus:bg-white/10 focus:ring-2 focus:ring-brand-pink/50 rounded px-1.5 -mx-1.5 transition-all cursor-text whitespace-pre-wrap" contenteditable="true" spellcheck="false">${step.title}</h3>
                    </div>
                    
                    <p data-step-id="${step.id}" class="text-slate-400 font-medium leading-relaxed text-sm md:text-base relative z-10 mt-2 outline-none focus:bg-white/10 focus:text-white focus:ring-2 focus:ring-brand-pink/50 rounded px-1.5 -mx-1.5 py-1 transition-all cursor-text whitespace-pre-wrap" contenteditable="true" spellcheck="false">${step.description}</p>

                    ${isDecision ? `
                    <div class="flex gap-3 mt-6">
                        <div class="flex items-center gap-1.5 text-xs font-bold tracking-wide text-emerald-400 bg-emerald-400/10 px-4 py-2 rounded-md border border-emerald-400/20 pointer-events-none">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i> GO
                        </div>
                    </div>` : ''}
                </div>
            `;
        }

        PROCESS_STEPS.forEach((step, index) => {
            const isTop = index % 2 === 0;
            const isDecision = step.type === 'decision';
            const isLastStep = index === PROCESS_STEPS.length - 1;
            
            const stepElement = document.createElement('div');
            stepElement.className = 'step-container relative flex flex-col items-center justify-center w-[280px] md:w-[360px] shrink-0 group';
            stepElement.style.scrollSnapAlign = 'center';
            stepElement.id = `step-${step.id}`;

            stepElement.innerHTML = `
                <div class="w-full px-6 flex flex-col justify-end pb-12 step-card-top ${!isTop ? 'opacity-0 invisible h-64 !transition-none' : ''}">
                    ${isTop ? generateCardHTML(step, isDecision) : ''}
                </div>

                <div class="relative z-20 flex items-center justify-center step-node">
                    <div class="absolute left-1/2 w-[2px] border-l-2 border-dashed border-brand-pink/30 step-line
                        ${isTop ? 'bottom-full h-12 origin-bottom' : 'top-full h-12 origin-top'}">
                    </div>

                    <div class="relative flex items-center justify-center
                        ${isDecision ? 'w-14 h-14 rotate-45' : 'w-12 h-12 md:w-14 md:h-14 group-hover:-translate-y-2'} 
                        rounded-xl shadow-lg transform transition-all duration-300 group-hover:scale-110
                        bg-gradient-to-br ${step.color} ${step.shadow} group-hover:shadow-[0_0_30px_rgba(223,53,128,0.3)]
                        ${isLastStep ? 'ring-4 ring-brand-yellow/40' : 'ring-2 ring-slate-800'}">
                        
                        <div class="absolute inset-0 rounded-xl border border-white/20 animate-ping opacity-20 pointer-events-none"></div>
                        
                        <div class="${isDecision ? '-rotate-45' : ''}">
                            <i data-lucide="${step.icon}" class="w-5 h-5 md:w-6 md:h-6 text-white drop-shadow-sm pointer-events-none"></i>
                        </div>
                    </div>
                </div>

                <div class="w-full px-6 flex flex-col justify-start pt-12 step-card-bottom ${isTop ? 'opacity-0 invisible h-64 !transition-none' : ''}">
                    ${!isTop ? generateCardHTML(step, isDecision) : ''}
                </div>
            `;
            
            stepsContainer.appendChild(stepElement);
        });

        lucide.createIcons();

        let visibleCount = 0;
        PROCESS_STEPS.forEach((step, index) => {
            setTimeout(() => {
                const el = document.getElementById(`step-${step.id}`);
                if(el) el.classList.add('is-visible');
                
                visibleCount++;
                progressBar.style.width = `${(visibleCount / PROCESS_STEPS.length) * 100}%`;
                
            }, 400 + (index * 300));
        });

        scrollContainer.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                scrollContainer.scrollBy({
                    left: e.deltaY * 2,
                    behavior: 'smooth'
                });
            }
        }, { passive: false });
        
        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('keydown', (e) => {
                e.stopPropagation();
            });
        });

    </script>
</body>
</html>
